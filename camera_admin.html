<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruling Eye｜本部モニター</title>
  <link rel="stylesheet" href="camera.css">
</head>
<body class="camera-page camera-admin-page">
  <main class="camera-admin-shell">
    <header class="camera-header camera-admin-header">
      <div>
        <p class="camera-kicker">RULING EYE</p>
        <h1>Ruling Eye｜本部モニター</h1>
        <p class="camera-subtitle">競技委員 映像裁定支援システム</p>
      </div>
      <p id="adminConnectionStatus" class="camera-status" role="status" data-tone="idle">大会IDを入力してください</p>
    </header>

    <section class="camera-admin-layout">
      <aside class="camera-sidebar">
        <section class="camera-panel tournament-panel">
          <label class="camera-field">大会ID
            <input id="tournamentId" type="text" autocomplete="off" placeholder="例: 2026-championship">
          </label>
          <button id="watchCallsButton" class="camera-button camera-button-primary" type="button">呼出を表示</button>
        </section>
        <section class="camera-call-list-section" aria-label="競技委員待機一覧">
          <div class="camera-section-heading">
            <h2>競技委員待機一覧</h2>
            <span id="officerCount" class="camera-count">0</span>
          </div>
          <div id="officerList" class="camera-call-list">
            <p class="camera-empty">大会IDを入力して待機中の競技委員を表示してください。</p>
          </div>
        </section>
        <section class="camera-panel hq-request-panel" aria-label="本部から映像依頼">
          <div class="camera-section-heading"><h2>本部から映像依頼</h2></div>
          <p id="selectedOfficer" class="camera-selected-officer">競技委員を選択してください</p>
          <label class="camera-field">ホール番号<input id="requestHole" type="number" min="1" max="99" inputmode="numeric" placeholder="例: 8"></label>
          <label class="camera-field">組番号<input id="requestGroupNo" type="text" inputmode="numeric" placeholder="例: 12"></label>
          <label class="camera-field">理由
            <select id="requestReason">
              <option>競技委員要請</option><option>ボール確認</option><option>救済確認</option><option>本部確認</option><option>その他</option>
            </select>
          </label>
          <button id="sendRequestButton" class="camera-button camera-button-primary" type="button" disabled>映像依頼</button>
        </section>
        <section class="camera-call-list-section" aria-label="本部からの映像依頼一覧">
          <div class="camera-section-heading"><h2>本部からの映像依頼</h2></div>
          <div id="hqCallList" class="camera-call-list"><p class="camera-empty">映像依頼はありません。</p></div>
        </section>
        <section class="camera-call-list-section" aria-label="呼出中の競技委員">
          <div class="camera-section-heading">
            <h2>映像セッション</h2>
            <span id="callCount" class="camera-count">0</span>
          </div>
          <div id="callList" class="camera-call-list">
            <p class="camera-empty">大会IDを入力して呼出を表示してください。</p>
          </div>
        </section>
      </aside>

      <section class="camera-viewer-column">
        <section class="camera-panel camera-viewer-panel">
          <div class="camera-section-heading">
            <h2 id="viewerTitle">映像確認</h2>
            <span id="viewerState" class="camera-state-badge" data-state="idle">未接続</span>
          </div>
          <p id="qualityDisplay" class="camera-quality-display">画質: 未取得</p>
          <div class="camera-remote-wrap">
            <video id="remoteVideo" class="camera-video camera-remote-video" autoplay playsinline muted controls></video>
            <div id="remotePlaceholder" class="camera-video-placeholder">接続する呼出を選択してください</div>
          </div>
          <div class="camera-video-actions" aria-label="映像と音声の操作">
            <button id="manualPlayButton" class="camera-button camera-button-primary" type="button" hidden>映像を表示</button>
            <button id="reloadVideoButton" class="camera-button camera-button-secondary" type="button" hidden>映像を再読み込み</button>
            <button id="unmuteButton" class="camera-button camera-button-secondary" type="button" hidden>音声 ON</button>
          </div>
          <p id="adminError" class="camera-error" role="alert" hidden></p>
          <section class="camera-debug" aria-label="WebRTCデバッグ">
            <p class="camera-debug-title">WebRTC デバッグ</p>
            <ul id="adminDebug" class="camera-debug-list" aria-live="polite">
              <li>接続する呼出を選択してください</li>
            </ul>
          </section>
        </section>

        <section class="camera-panel camera-memo-panel">
          <label class="camera-field" for="memo">裁定メモ
            <textarea id="memo" rows="4" placeholder="確認内容・裁定内容を記録"></textarea>
          </label>
          <button id="completeButton" class="camera-button camera-button-danger" type="button" disabled>対応完了</button>
        </section>
      </section>
    </section>
  </main>

  <!-- 既存プロジェクトに firebase-config.js がある場合はその設定を利用します。 -->
  <script src="./firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="camera.js"></script>
</body>
</html>
